# ============================================================================
# SECURITY: Minimum release age for npm packages (supply-chain attack defense)
# ============================================================================
#
# Este arquivo configura o workspace do monorepo (pnpm-workspace.yaml).
#
# PROBLEMA ORIGINAL:
# O projeto foi criado no Replit, que roda Linux x64. Para economizar espaço
# em disco, os overrides excluíam TODOS os binários nativos de outras
# plataformas (Windows, Mac, Android, etc). Isso funciona bem no Replit,
# mas quebra ao rodar no Windows — os binários win32 eram explicitamente
# bloqueados com "-" (que significa "não instalar").
#
# SOLUÇÃO APLICADA:
# Removemos todos os overrides de plataforma. Agora o pnpm vai instalar
# apenas o binário correto para o sistema atual (Windows x64), que é o
# comportamento padrão e correto fora do Replit.
#
# O único override mantido é o do esbuild (versão pinada em 0.27.3) porque
# versões mais novas têm uma vulnerabilidade conhecida usada pelo drizzle-kit.
# ============================================================================

# Exige que pacotes tenham sido publicados há pelo menos 1 dia antes de
# serem instalados. Defesa contra ataques de supply-chain (pacotes maliciosos
# são geralmente detectados em horas).
minimumReleaseAge: 1440

# Exceções à regra acima — pacotes confiáveis que podem ser instalados
# imediatamente sem aguardar o período de 1 dia.
minimumReleaseAgeExclude:
  - '@replit/*'       # pacotes internos do Replit, sem risco de supply-chain
  - stripe-replit-sync

# Define quais pastas fazem parte do monorepo.
# Cada subpasta dentro de artifacts/ e lib/ é tratada como um pacote
# independente com seu próprio package.json.
packages:
  - artifacts/*         # apps (ex: academia, academia-mobile, api-server)
  - lib/*               # bibliotecas internas (ex: api-client-react, db)
  - lib/integrations/*  # integrações específicas dentro de lib
  - scripts             # scripts utilitários (seed, migrations, etc)

# Catálogo central de versões — evita que cada pacote do monorepo declare
# versões diferentes da mesma dependência. Quando um package.json usa
# "catalog:" no lugar de uma versão, ele busca aqui.
catalog:
  '@replit/vite-plugin-cartographer': ^0.5.1
  '@replit/vite-plugin-dev-banner': ^0.1.1
  '@replit/vite-plugin-runtime-error-modal': ^0.0.6
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0      # versão exata exigida pelo Expo (mobile)
  react-dom: 19.1.0  # versão exata exigida pelo Expo (mobile)
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vite: ^7.3.2
  wouter: ^3.3.5
  zod: ^3.25.76

# Desativa a instalação automática de peer dependencies.
# Cada pacote declara explicitamente o que precisa — evita conflitos de versão.
autoInstallPeers: false

# Lista de pacotes que têm permissão para rodar scripts durante a instalação
# (ex: compilar binários nativos). Por segurança, o pnpm bloqueia isso por
# padrão — só pacotes listados aqui podem executar postinstall/build scripts.
onlyBuiltDependencies:
  - '@swc/core'    # compilador JS/TS em Rust, precisa compilar binário nativo
  - core-js        # polyfills, roda script de build durante instalação
  - esbuild        # bundler, compila seu binário nativo
  - msw            # mock service worker, precisa de postinstall
  - unrs-resolver  # resolver de módulos em Rust

# Overrides forçam versões específicas de dependências transitivas
# (dependências de dependências), ignorando o que cada pacote pede.
overrides:
  # O drizzle-kit usa internamente uma versão antiga do esbuild com
  # vulnerabilidade conhecida. Este override substitui esse loader
  # pela versão segura do tsx, que tem a mesma função.
  "@esbuild-kit/esm-loader": "npm:tsx@^4.21.0"

  # Pina o esbuild na 0.27.3 em todo o monorepo. Versões mais novas
  # quebraram compatibilidade com alguns plugins usados no projeto.
  esbuild: "0.27.3"