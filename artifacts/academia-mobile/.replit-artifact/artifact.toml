kind = "mobile"
previewPath = "/mobile/"
title = "Front Artes Marciais — Mobile"
version = "1.0.0"
id = "artifacts/academia-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24114

[services.development]
run = "pnpm --filter @workspace/academia-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/academia-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/academia-mobile", "run", "serve" ]

[services.env]
PORT = "24114"
BASE_PATH = "/mobile/"
