kind = "web"
previewPath = "/"
title = "Academia Fight Club"
version = "1.0.0"
id = "artifacts/academia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18373

[services.development]
run = "pnpm --filter @workspace/academia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/academia", "run", "build" ]
publicDir = "artifacts/academia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18373"
BASE_PATH = "/"
