openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Academia Fight Club API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: students
    description: Student profiles
  - name: sessions
    description: Training sessions
  - name: attendance
    description: Attendance tracking
  - name: face
    description: Facial recognition
  - name: rankings
    description: Attendance rankings
  - name: stats
    description: Dashboard statistics
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [student, teacher, admin]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students with their profiles
      parameters:
        - name: modality
          in: query
          schema:
            type: string
            enum: [thai, jiu, both]
        - name: search
          in: query
          schema:
            type: string
        - name: unit
          in: query
          schema:
            type: string
            enum: [matriz, panobianco, upfitness]
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentProfile"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student profile by user ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
        "404":
          description: Not found
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update student profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentProfileUpdate"
      responses:
        "200":
          description: Updated student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List training sessions
      parameters:
        - name: modality
          in: query
          schema:
            type: string
            enum: [thai, jiu]
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingSession"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a training session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainingSessionInput"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingSession"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a training session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingSession"
        "404":
          description: Not found
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a training session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: sessionId
          in: query
          schema:
            type: integer
        - name: studentId
          in: query
          schema:
            type: integer
        - name: modality
          in: query
          schema:
            type: string
            enum: [thai, jiu]
      responses:
        "200":
          description: List of attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: createAttendance
      tags: [attendance]
      summary: Create attendance record (mark student present)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "201":
          description: Attendance recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/{id}:
    delete:
      operationId: deleteAttendance
      tags: [attendance]
      summary: Remove an attendance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /rankings:
    get:
      operationId: listRankings
      tags: [rankings]
      summary: Get attendance rankings
      parameters:
        - name: modality
          in: query
          schema:
            type: string
            enum: [thai, jiu, both]
        - name: period
          in: query
          schema:
            type: string
            enum: [week, month, year, all]
      responses:
        "200":
          description: Ranked students by attendance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentRanking"

  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payment statuses for a given month/year
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentStatus"

  /payments/{studentId}/{year}/{month}:
    put:
      operationId: markPayment
      tags: [payments]
      summary: Mark a student as paid for a month
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkPaymentInput"
      responses:
        "200":
          description: Marked as paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentStatus"
    delete:
      operationId: unmarkPayment
      tags: [payments]
      summary: Unmark a student payment for a month
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: year
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unmarked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent training activity
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /face/profile-photo:
    post:
      operationId: registerProfilePhoto
      tags: [face]
      summary: Set a user's profile photo and compute their reference face descriptor
      description: |
        Server downloads the uploaded photo, sets it as the user's profile photo,
        and (for students) detects the face and stores the 128-float descriptor used
        as the recognition reference. Returns faceDetected=false if no face is found.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterProfilePhotoInput"
      responses:
        "200":
          description: Profile photo saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilePhotoResult"
        "400":
          description: Bad request
        "404":
          description: User not found

  /face/recognize-team:
    post:
      operationId: recognizeTeam
      tags: [face]
      summary: Detect and identify all students in a whole-team post-training photo
      description: |
        Server downloads the team photo, detects every face, and matches each one
        against stored student reference descriptors. Returns each matched student
        with the modalities they train (so attendance can be marked in both).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecognizeTeamInput"
      responses:
        "200":
          description: Recognition result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamRecognitionResult"
        "400":
          description: Bad request

  /attendance/bulk:
    post:
      operationId: bulkAttendance
      tags: [attendance]
      summary: Mark attendance for many students across the modalities they train
      description: |
        For each student, for each modality they train, finds (or creates) today's
        session for that modality and inserts an attendance record if one does not
        already exist. Server-side dedupe prevents duplicate presence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkAttendanceInput"
      responses:
        "200":
          description: Bulk attendance result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkAttendanceResult"
        "400":
          description: Bad request

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [student, teacher]
        unit:
          type: string
          enum: [matriz, panobianco, upfitness]
          nullable: true
        phone:
          type: string
        birthDate:
          type: string
          nullable: true
        paymentDay:
          type: integer
          nullable: true
          minimum: 1
          maximum: 31
        modalityThai:
          type: boolean
          nullable: true
        modalityJiu:
          type: boolean
          nullable: true
        bollacha:
          type: boolean
          nullable: true
        thaiGrade:
          type: string
          nullable: true
        thaiGradeColor:
          type: string
          nullable: true
        jiuGrade:
          type: string
          nullable: true
        jiuGradeColor:
          type: string
          nullable: true
        jiuDegree:
          type: integer
          nullable: true

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, name, email, role, unit, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [student, teacher, admin]
        unit:
          type: string
          enum: [matriz, panobianco, upfitness]
        phone:
          type: ["string", "null"]
        profilePhotoUrl:
          type: ["string", "null"]
        birthDate:
          type: ["string", "null"]
        paymentDay:
          type: ["integer", "null"]
        modalityThai:
          type: ["boolean", "null"]
        modalityJiu:
          type: ["boolean", "null"]
        thaiGrade:
          type: ["string", "null"]
        thaiGradeColor:
          type: ["string", "null"]
        jiuGrade:
          type: ["string", "null"]
        jiuGradeColor:
          type: ["string", "null"]
        jiuDegree:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        unit:
          type: string
          enum: [matriz, panobianco, upfitness]
          nullable: true
        phone:
          type: string
        profilePhotoUrl:
          type: string
        birthDate:
          type: string
          nullable: true
        paymentDay:
          type: integer
          nullable: true
        modalityThai:
          type: boolean
          nullable: true
        modalityJiu:
          type: boolean
          nullable: true
        thaiGrade:
          type: string
          nullable: true
        thaiGradeColor:
          type: string
          nullable: true
        jiuGrade:
          type: string
          nullable: true
        jiuGradeColor:
          type: string
          nullable: true
        jiuDegree:
          type: integer
          nullable: true

    StudentProfile:
      type: object
      required: [id, userId, name, email, unit, modalityThai, modalityJiu, bollacha, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        unit:
          type: string
          enum: [matriz, panobianco, upfitness]
        profilePhotoUrl:
          type: ["string", "null"]
        modalityThai:
          type: boolean
        modalityJiu:
          type: boolean
        bollacha:
          type: boolean
        thaiGrade:
          type: ["string", "null"]
        jiuGrade:
          type: ["string", "null"]
        thaiGradeColor:
          type: ["string", "null"]
        jiuGradeColor:
          type: ["string", "null"]
        jiuDegree:
          type: ["integer", "null"]
        hasFaceDescriptor:
          type: boolean
        totalAttendanceThai:
          type: integer
        totalAttendanceJiu:
          type: integer
        createdAt:
          type: string
          format: date-time

    StudentProfileUpdate:
      type: object
      properties:
        modalityThai:
          type: boolean
        modalityJiu:
          type: boolean
        bollacha:
          type: boolean
        thaiGrade:
          type: string
        jiuGrade:
          type: string
        thaiGradeColor:
          type: string
        jiuGradeColor:
          type: string
        jiuDegree:
          type: integer

    TrainingSession:
      type: object
      required: [id, modality, sessionDate, teacherId, teacherName, createdAt]
      properties:
        id:
          type: integer
        modality:
          type: string
          enum: [thai, jiu]
        sessionDate:
          type: string
          format: date-time
        description:
          type: ["string", "null"]
        teacherId:
          type: integer
        teacherName:
          type: string
        attendanceCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    TrainingSessionInput:
      type: object
      required: [modality, sessionDate, teacherId]
      properties:
        modality:
          type: string
          enum: [thai, jiu]
        sessionDate:
          type: string
          format: date-time
        description:
          type: string
        teacherId:
          type: integer

    AttendanceRecord:
      type: object
      required: [id, sessionId, studentId, studentName, modality, createdAt]
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        studentId:
          type: integer
        studentName:
          type: string
        studentPhotoUrl:
          type: ["string", "null"]
        modality:
          type: string
          enum: [thai, jiu]
        postTrainingPhotoUrl:
          type: ["string", "null"]
        faceRecognized:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AttendanceInput:
      type: object
      required: [sessionId, studentId]
      properties:
        sessionId:
          type: integer
        studentId:
          type: integer
        postTrainingPhotoUrl:
          type: string
        faceRecognized:
          type: boolean

    StudentRanking:
      type: object
      required: [rank, studentId, name, totalSessions, presentCount, percentage]
      properties:
        rank:
          type: integer
        studentId:
          type: integer
        name:
          type: string
        profilePhotoUrl:
          type: ["string", "null"]
        thaiGrade:
          type: ["string", "null"]
        jiuGrade:
          type: ["string", "null"]
        thaiGradeColor:
          type: ["string", "null"]
        jiuGradeColor:
          type: ["string", "null"]
        jiuDegree:
          type: ["integer", "null"]
        totalSessions:
          type: integer
        presentCount:
          type: integer
        percentage:
          type: number
        modality:
          type: string

    MarkPaymentInput:
      type: object
      properties:
        notes:
          type: ["string", "null"]

    PaymentStatus:
      type: object
      required: [studentId, name, month, year, paid]
      properties:
        studentId:
          type: integer
        name:
          type: string
        profilePhotoUrl:
          type: ["string", "null"]
        paymentDay:
          type: ["integer", "null"]
        paid:
          type: boolean
        paidAt:
          type: ["string", "null"]
          format: date-time
        notes:
          type: ["string", "null"]

    DashboardStats:
      type: object
      required: [totalStudents, totalTeachers, totalSessionsThai, totalSessionsJiu, attendanceTodayThai, attendanceTodayJiu, totalAttendanceThisMonth]
      properties:
        totalStudents:
          type: integer
        totalTeachers:
          type: integer
        totalSessionsThai:
          type: integer
        totalSessionsJiu:
          type: integer
        attendanceTodayThai:
          type: integer
        attendanceTodayJiu:
          type: integer
        totalAttendanceThisMonth:
          type: integer
        studentsThaiOnly:
          type: integer
        studentsJiuOnly:
          type: integer
        studentsBoth:
          type: integer

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [attendance, session, registration, graduation]
        description:
          type: string
        studentName:
          type: ["string", "null"]
        studentPhotoUrl:
          type: ["string", "null"]
        modality:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    RegisterProfilePhotoInput:
      type: object
      required: [userId, objectPath]
      properties:
        userId:
          type: integer
        objectPath:
          type: string
          description: Object path returned by the upload endpoint (e.g. /objects/uploads/uuid).
    ProfilePhotoResult:
      type: object
      required: [faceDetected, profilePhotoUrl, message]
      properties:
        faceDetected:
          type: boolean
        profilePhotoUrl:
          type: string
        message:
          type: string

    RecognizeTeamInput:
      type: object
      required: [objectPath]
      properties:
        objectPath:
          type: string
          description: Object path of the uploaded whole-team photo.
    TeamMatch:
      type: object
      required: [studentId, name, distance, modalityThai, modalityJiu]
      properties:
        studentId:
          type: integer
        name:
          type: string
        profilePhotoUrl:
          type: ["string", "null"]
        distance:
          type: number
        modalityThai:
          type: boolean
        modalityJiu:
          type: boolean
    TeamRecognitionResult:
      type: object
      required: [detectedFaces, matchedCount, unmatchedCount, photoUrl, matches]
      properties:
        detectedFaces:
          type: integer
        matchedCount:
          type: integer
        unmatchedCount:
          type: integer
        photoUrl:
          type: string
        matches:
          type: array
          items:
            $ref: "#/components/schemas/TeamMatch"

    BulkAttendanceStudent:
      type: object
      required: [studentId, modalities]
      properties:
        studentId:
          type: integer
          description: The student profile id.
        modalities:
          type: array
          items:
            type: string
            enum: [thai, jiu]
    BulkAttendanceInput:
      type: object
      required: [teacherId, students]
      properties:
        teacherId:
          type: integer
        photoUrl:
          type: string
        students:
          type: array
          items:
            $ref: "#/components/schemas/BulkAttendanceStudent"
    BulkAttendanceResult:
      type: object
      required: [created, skipped]
      properties:
        created:
          type: integer
        skipped:
          type: integer
