# Nginx do Martial Arts Hub — serve o front (build estático do Vite) e
# encaminha /api pro processo Node do api-server (systemd, porta 8080).
# Front e API ficam na MESMA origem (mesmo IP/porta 80) de propósito: o front
# chama "/api/..." relativo à própria origem (ver artifacts/academia/vite.config.ts
# em dev, e customFetch em produção) — nada de CORS pra configurar aqui.
#
# Instalado em /etc/nginx/sites-available/martial-arts-hub pelo setup-vps.sh.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Uploads de foto (perfil/cadastro facial/equipe) vão até 20MB — ver
    # MAX_UPLOAD_BYTES em artifacts/api-server/src/routes/storage.ts.
    client_max_body_size 20m;

    root /var/www/martial-arts-hub/artifacts/academia/dist/public;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Uploads/reconhecimento facial podem demorar alguns segundos.
        proxy_read_timeout 60s;
    }

    # SPA (wouter): rotas do front que não são arquivo real caem no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
